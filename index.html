<button class="add-pin-trigger" onclick="openForm()">+</button>

<div id="add-form-card" class="form-card">
    <span class="btn-close" onclick="closeForm()">CANCEL ×</span>
    <h3>New Echo Registry</h3>
    <input type="text" id="user-name" placeholder="Your Name">
    <textarea id="user-echo" placeholder="Leave your sincere message..."></textarea>
    <button class="submit-btn" onclick="submitPin()">Register Pin ($1 AUD)</button>
</div>

<style>
    .add-pin-trigger {
        position: absolute; bottom: 30px; right: 30px; z-index: 10;
        background: var(--copper); color: white; border: none;
        width: 60px; height: 60px; border-radius: 50%;
        font-size: 2rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .form-card {
        position: absolute; top: -100%; left: 50%; transform: translateX(-50%);
        width: 90%; max-width: 400px; background: white; padding: 30px;
        z-index: 30; transition: top 0.6s ease; border-bottom: 5px solid var(--copper);
    }
    .form-card.active { top: 20px; }
    h3 { font-family: 'Georgia', serif; color: var(--slate); margin-top: 0; }
    input, textarea {
        width: 100%; padding: 12px; margin: 10px 0;
        border: 1px solid #ddd; font-family: 'Georgia', serif; box-sizing: border-box;
    }
    .submit-btn {
        width: 100%; background: var(--slate); color: white; padding: 15px;
        border: none; cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
    }
</style>

<script>
    function openForm() { document.getElementById('add-form-card').classList.add('active'); }
    function closeForm() { document.getElementById('add-form-card').classList.remove('active'); }
    function submitPin() {
        // This will eventually link to your Stripe checkout
        window.location.href = "https://donate.stripe.com/5kQ14f6lBdT6aXN0j15wI00";
    }
</script>
        }
    </script>
</body>
</html>
